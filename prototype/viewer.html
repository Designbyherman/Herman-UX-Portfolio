<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype Viewer</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111110;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .iphone-shell {
    width: 393px;
    height: 852px;
    border-radius: 55px;
    background: #050505;
    border: 8px solid #050505;
    box-shadow:
      inset 1px 1px 0 rgba(255,255,255,0.08),
      inset -1px -1px 0 rgba(0,0,0,0.24),
      0 0 0 2px #050505,
      0 0 0 5px #8a887f,
      -2px -2px 0 5px rgba(208,206,196,0.16),
      2px 2px 0 5px rgba(42,41,38,0.2),
      0 42px 94px rgba(0,0,0,0.44),
      0 14px 34px rgba(0,0,0,0.22);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
    isolation: isolate;
  }

  .phone-stage {
    width: 393px;
    height: 852px;
    position: relative;
    isolation: isolate;
    transform: scale(1.08);
    transform-origin: center center;
  }

  .side-button {
    position: absolute;
    z-index: -1;
    width: 5px;
    border-radius: 999px;
    background:
      linear-gradient(
        180deg,
        #d8d6cd 0%,
        #b1aea5 22%,
        #7d7a73 58%,
        #4f4d49 100%
      );
    box-shadow:
      inset 1px 0 0 rgba(255,255,255,0.38),
      inset -1px 0 0 rgba(0,0,0,0.18),
      0 1px 2px rgba(0,0,0,0.14);
    pointer-events: none;
  }

  .action-button {
    left: -12px;
    top: 150px;
    height: 30px;
  }

  .volume-up {
    left: -12px;
    top: 210px;
    height: 66px;
  }

  .volume-down {
    left: -12px;
    top: 292px;
    height: 66px;
  }

  .power-button {
    right: -12px;
    top: 250px;
    height: 96px;
  }

  .status-area {
    width: 100%;
    height: 54px;
    background: #fff;
    flex-shrink: 0;
    position: relative;
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  }

  .status-time {
    position: absolute;
    left: 31px;
    top: 18px;
    font-size: 16px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0;
  }

  .status-icons {
    position: absolute;
    right: 29px;
    top: 17px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .cellular {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 12px;
  }

  .cellular span {
    width: 3px;
    border-radius: 2px;
    background: #000;
  }

  .cellular span:nth-child(1) { height: 4px; }
  .cellular span:nth-child(2) { height: 6px; }
  .cellular span:nth-child(3) { height: 9px; }
  .cellular span:nth-child(4) { height: 11px; }

  .wifi {
    width: 16px;
    height: 12px;
    position: relative;
  }

  .wifi::before,
  .wifi::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border: 2px solid transparent;
    border-top-color: #000;
    border-radius: 50%;
  }

  .wifi::before {
    top: 1px;
    width: 16px;
    height: 16px;
  }

  .wifi::after {
    top: 5px;
    width: 9px;
    height: 9px;
  }

  .wifi-dot {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #000;
    transform: translateX(-50%);
  }

  .battery {
    width: 25px;
    height: 12px;
    border: 1.5px solid #000;
    border-radius: 3px;
    position: relative;
  }

  .battery::before {
    content: "";
    position: absolute;
    right: -4px;
    top: 3px;
    width: 2px;
    height: 5px;
    border-radius: 0 2px 2px 0;
    background: #000;
  }

  .battery::after {
    content: "";
    position: absolute;
    left: 2px;
    top: 2px;
    width: 18px;
    height: 6px;
    border-radius: 1.5px;
    background: #000;
  }

  .dynamic-island {
    width: 120px;
    height: 34px;
    border-radius: 20px;
    background: #000;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }

  .screen-wrapper {
    width: 100%;
    flex-grow: 1;
    overflow: hidden;
    position: relative;
  }

  .iphone-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

</style>
</head>
<body>
  <div class="phone-stage">
    <div class="side-button action-button" aria-hidden="true"></div>
    <div class="side-button volume-up" aria-hidden="true"></div>
    <div class="side-button volume-down" aria-hidden="true"></div>
    <div class="side-button power-button" aria-hidden="true"></div>
    <div class="iphone-shell">
      <div class="status-area">
        <div class="status-time">9:41</div>
        <div class="dynamic-island"></div>
        <div class="status-icons" aria-hidden="true">
          <div class="cellular">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="wifi">
            <span class="wifi-dot"></span>
          </div>
          <div class="battery"></div>
        </div>
      </div>
      <div class="screen-wrapper">
        <iframe class="iphone-screen" src="acc-eval-modern.html" title="ACC course evaluation mobile prototype"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
